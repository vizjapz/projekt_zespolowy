---
- name: Install k3s server
  shell: curl -sfL https://get.k3s.io | sh -
  args:
    creates: /etc/systemd/system/k3s.service

- name: Ensure k3s is started and enabled
  systemd:
    name: k3s
    state: started
    enabled: true

- name: Wait for node token to be generated
  wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 60

- name: Read node token
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw

- name: Store token as fact for agents
  set_fact:
    k3s_node_token: "{{ k3s_token_raw['content'] | b64decode | trim }}"

- name: Wait for control-plane node to be Ready
  command: k3s kubectl get node {{ ansible_hostname }} -o jsonpath='{.status.conditions[-1].type}'
  register: node_ready
  until: node_ready.stdout == "Ready"
  retries: 20
  delay: 10
