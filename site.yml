---
# Play 1 – podstawowa konfiguracja wszystkich węzłów
- name: Common setup (swap, /etc/hosts, dependencies)
  hosts: k8s_cluster
  roles:
    - common

# Play 2 – instalacja k3s na control plane
- name: Install k3s server (control plane)
  hosts: control_plane
  roles:
    - k3s_server

# Play 3 – dołączanie węzłów roboczych
- name: Install k3s agents (workers)
  hosts: workers
  roles:
    - k3s_agent

# Play 4 – weryfikacja klastra
- name: Verify cluster health
  hosts: control_plane
  roles:
    - verify
